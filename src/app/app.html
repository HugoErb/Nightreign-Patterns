<main class="h-screen overflow-hidden bg-zinc-950 text-zinc-100">
  @if (loading()) {
    <div class="flex h-full items-center justify-center text-zinc-400">Chargement des données locales...</div>
  } @else if (loadError()) {
    <div class="flex h-full items-center justify-center text-red-300">{{ loadError() }}</div>
  } @else if (data(); as nightreignData) {
    <div class="grid h-full min-h-0 overflow-hidden grid-cols-[280px_minmax(0,1fr)_380px]">
      <app-filters
        [filters]="filters()"
        [nightlords]="nightreignData.nightlords"
        [mapTypes]="nightreignData.mapTypes"
        [spawnPoints]="filteredSpawnPoints()"
        [resultCount]="filteredPatterns().length"
        (filtersChange)="updateFilters($event)"
        (reset)="resetFilters()"
        (blankMapRequested)="showBlankMap()"
      />

      <app-interactive-map
        [spawnPoints]="filteredSpawnPoints()"
        [selectedMapTypeId]="filters().mapTypeId"
        [selectedSpawnId]="filters().spawnPointId"
        [selectedSpawnName]="selectedSpawnName()"
        [displayedPattern]="displayedPattern()"
        (spawnSelected)="selectSpawn($event)"
      />

      <app-pattern-list
        [patterns]="filteredPatterns()"
        [selectedPattern]="displayedPattern()"
        [nightlordName]="nightlordName"
        [mapTypeName]="mapTypeName"
        [spawnName]="spawnName"
        [eventNames]="eventNames"
        (selectPattern)="showPatternOnMap($event)"
      />
    </div>
  }
</main>
