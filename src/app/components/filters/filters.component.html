<aside class="h-full border-r border-zinc-800 bg-zinc-950/95 p-4">
  <div class="mb-5">
    <h1 class="text-lg font-semibold text-zinc-100">Nightreign Patterns</h1>
    <p class="mt-1 text-sm text-zinc-400">{{ resultCount }} résultat(s)</p>
  </div>

  <div class="space-y-4">
    <div class="block">
      <span class="mb-2 flex items-center gap-1.5 text-xs font-medium uppercase tracking-wide text-zinc-400">
        <svg class="size-3.5 text-amber-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M15.6 13.5A7 7 0 0 1 6.5 4.4a6.7 6.7 0 1 0 9.1 9.1Z" />
        </svg>
        Nightlord
      </span>
      <div class="relative" (keydown.escape)="nightlordDropdownOpen = false">
        <button
          type="button"
          class="flex w-full items-center gap-2 rounded-lg border border-zinc-800 bg-zinc-900 py-2 pl-3 pr-10 text-left text-sm text-zinc-100 outline-none focus:ring-2 focus:ring-amber-500"
          (click)="nightlordDropdownOpen = !nightlordDropdownOpen"
        >
          @if (selectedNightlord(); as nightlord) {
            <img class="size-9 shrink-0 object-contain" [src]="nightlord.imageUrl" [alt]="nightlord.name" />
            <span>{{ nightlord.name }}</span>
          } @else {
            <span class="flex size-9 shrink-0 items-center justify-center text-2xl font-semibold text-white">?</span>
            <span>Inconnu</span>
          }
        </button>
        <svg class="pointer-events-none absolute right-4 top-1/2 size-4 -translate-y-1/2 text-zinc-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M5.5 7.5 10 12l4.5-4.5H5.5Z" />
        </svg>
        @if (nightlordDropdownOpen) {
          <div class="absolute z-20 mt-1 max-h-72 w-full overflow-auto rounded-lg border border-zinc-800 bg-zinc-950 shadow-xl">
            <button
              type="button"
              class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm text-zinc-100 hover:bg-zinc-800"
              (click)="selectNightlord('')"
            >
              <span class="flex size-9 shrink-0 items-center justify-center text-2xl font-semibold text-white">?</span>
              <span>Inconnu</span>
            </button>
            @for (nightlord of nightlords; track nightlord.id) {
              <button
                type="button"
                class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm text-zinc-100 hover:bg-zinc-800"
                (click)="selectNightlord(nightlord.id)"
              >
                <img class="size-9 shrink-0 object-contain" [src]="nightlord.imageUrl" [alt]="nightlord.name" />
                <span>{{ nightlord.name }}</span>
              </button>
            }
          </div>
        }
      </div>
    </div>

    <label class="block">
      <span class="mb-2 flex items-center gap-1.5 text-xs font-medium uppercase tracking-wide text-zinc-400">
        <svg class="size-3.5 text-amber-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="m7 3-5 2v12l5-2 6 2 5-2V3l-5 2-6-2Zm1.2 2.4 3.6 1.2v8l-3.6-1.2v-8Zm-4 1.1 2-.8v7.8l-2 .8V6.5Zm11.6 7-2 .8V6.5l2-.8v7.8Z" />
        </svg>
        Type de carte
      </span>
      <div class="relative">
        <select
          class="w-full appearance-none rounded-lg border border-zinc-800 bg-zinc-900 py-2 pl-3 pr-10 text-sm text-zinc-100 outline-none focus:ring-2 focus:ring-amber-500"
          [ngModel]="filters.mapTypeId"
          (ngModelChange)="update({ mapTypeId: $event })"
        >
          @for (mapType of mapTypes; track mapType.id) {
            <option [value]="mapType.id">{{ mapType.name }}</option>
          }
        </select>
        <svg class="pointer-events-none absolute right-4 top-1/2 size-4 -translate-y-1/2 text-zinc-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M5.5 7.5 10 12l4.5-4.5H5.5Z" />
        </svg>
      </div>
    </label>

    <div class="block">
      <span class="mb-2 flex items-center gap-1.5 text-xs font-medium uppercase tracking-wide text-zinc-400">
        <svg class="size-3.5 text-amber-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M10 2.5a5.5 5.5 0 0 0-5.5 5.5c0 4.1 5.5 9.5 5.5 9.5s5.5-5.4 5.5-9.5A5.5 5.5 0 0 0 10 2.5Zm0 7.5a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z" />
        </svg>
        Spawn
      </span>
      <div class="flex gap-2">
        <div class="relative min-w-0 flex-1">
          <select
            class="w-full appearance-none rounded-lg border border-zinc-800 bg-zinc-900 py-2 pl-3 pr-10 text-sm text-zinc-100 outline-none focus:ring-2 focus:ring-amber-500"
            [ngModel]="filters.spawnPointId"
            (ngModelChange)="update({ spawnPointId: $event })"
          >
            <option value="">Tous / inconnu</option>
            @for (spawn of spawnPoints; track spawn.id) {
              <option [value]="spawn.id">{{ spawn.name }}</option>
            }
          </select>
          <svg class="pointer-events-none absolute right-4 top-1/2 size-4 -translate-y-1/2 text-zinc-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="M5.5 7.5 10 12l4.5-4.5H5.5Z" />
          </svg>
        </div>
        <button
          type="button"
          class="flex size-10 shrink-0 cursor-pointer items-center justify-center rounded-lg border border-amber-500/50 bg-zinc-900 text-amber-400 shadow-lg hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-amber-500"
          title="Carte vierge"
          aria-label="Afficher la carte vierge"
          (click)="blankMapRequested.emit()"
        >
          <svg class="size-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path d="m7 3-5 2v12l5-2 6 2 5-2V3l-5 2-6-2Zm1.2 2.4 3.6 1.2v8l-3.6-1.2v-8Zm-4 1.1 2-.8v7.8l-2 .8V6.5Zm11.6 7-2 .8V6.5l2-.8v7.8Z" />
          </svg>
        </button>
      </div>
    </div>

    <button
      type="button"
      class="w-full cursor-pointer rounded-lg border border-amber-500/50 bg-zinc-900 px-3 py-2 text-sm font-medium text-amber-400 shadow-lg hover:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-amber-500"
      (click)="reset.emit()"
    >
      Réinitialiser
    </button>
  </div>
</aside>
