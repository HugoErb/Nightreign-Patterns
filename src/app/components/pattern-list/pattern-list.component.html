<section class="flex h-screen min-h-0 flex-col overflow-hidden bg-zinc-950">
  <div class="border-b border-zinc-800 px-4 py-3">
    <h2 class="text-sm font-semibold text-zinc-100">Patterns</h2>
    <p class="text-xs text-zinc-400">{{ patterns.length }} résultat(s)</p>
  </div>

  <div class="min-h-0 flex-1 overflow-y-auto p-4">
    @if (patterns.length) {
      <div class="grid grid-cols-1 gap-3">
        @for (pattern of patterns; track pattern.id + pattern.nightlordId) {
          <app-pattern-card
            [pattern]="pattern"
            [selected]="isSelected(pattern)"
            [nightlordName]="nightlordName(pattern.nightlordId)"
            [mapTypeName]="mapTypeName(pattern.mapTypeId)"
            [spawnName]="spawnName(pattern.spawnPointId)"
            [eventNames]="eventNames(pattern.eventIds)"
            (selectPattern)="selectPattern.emit($event)"
          />
        }
      </div>
    } @else {
      <div class="rounded-lg border border-zinc-800 bg-zinc-900 p-4 text-sm text-zinc-400">Aucun pattern ne correspond aux filtres.</div>
    }
  </div>
</section>
